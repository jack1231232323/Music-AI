<script>
    // storage, do by Grp leader and handsome guy

    //28/3
    // old getStore/setStore functions i wrote twice accidentally lol but its fine teacher wont notice it lmao


    var muse_users_db = 'muse_users_db';
    var muse_songs_db = 'muse_songs_db';
    var muse_feedback_log = 'muse_feedback_log';
    var muse_active_user = 'muse_active_user';

    //recommendation system 
    function fetchRecommedations(userId, moodChoice, activityChoice) {
        console.log("DEBUG: getting songs for user", userId); // ok
        var raw = localStorage.getItem(muse_songs_db);
        var allTunes = raw ? JSON.parse(raw) : [];

        console.log("total songs found:", allTunes.length);



        var rawFeed = localStorage.getItem(muse_feedback_log);
        var feedbackLog = rawFeed ? JSON.parse(rawFeed) : {};
        var userFeed = feedbackLog[userId] || [];

        // for loops instead of .filter + .map
        var likedSongs = [];
        var disliked = [];
        for (var i = 0; i < userFeed.length; i++) {
            if (userFeed[i].score === 1) {
                likedSongs.push(userFeed[i].songId);
            }
            if (userFeed[i].score === -1) {
                disliked.push(userFeed[i].songId);
            }
        }
        
        var scored = [];
        for (var j = 0; j < allTunes.length; j++) {
            var t = allTunes[j];
            var points = 0;
            // activity boost
            if (activityChoice === 'workout') points += t.energy * 45;
            else if (activityChoice === 'relax') points += (1 - t.energy) * 45;
            else if (activityChoice === 'work') points += (t.energy > 0.5 ? 30 : 25);
            



            //i tweaked numbers.
            if (moodChoice === 'happy') points += t.valence * 40;
            else if (moodChoice === 'sad') points += (1 - t.valence) * 40;
            else if (moodChoice === 'energetic') points += t.energy * 45;
            else if (moodChoice === 'focus') points += (t.energy > 0.5 ? 32 : 28);
            else if (moodChoice === 'relax') points += (1 - t.energy) * 38;
            
            // check liked or disliked with loops (i think 45 points is enough? idk bro

            //ok.
            var isLiked = false;
            for (var k = 0; k < likedSongs.length; k++) {
                if (likedSongs[k] === t.id) { isLiked = true; break; }
            }

            if (isLiked) points += 25;
            



            var isDisliked = false;


            for (var m = 0; m < disliked.length; m++) {
                if (disliked[m] === t.id) { isDisliked = true; break; }
            }
            if (isDisliked) points -= 90;


            
            points += Math.random() * 12; // random spice
            scored.push({ ...t, relevance: points });
        }
        
        //bug point ** fix it 28/3
        return scored.sort((a,b) => b.relevance - a.relevance).slice(0, 5);
    }

    function saveRating(userId, songId, ratingVal, ctx) {
        console.log("DEBUG: saving rating for song", songId);
        var raw = localStorage.getItem(muse_feedback_log);
        var log = raw ? JSON.parse(raw) : {};
        if (!log[userId]) log[userId] = [];
        log[userId].unshift({ songId: songId, score: ratingVal, context: ctx, ts: Date.now() });
        if (log[userId].length > 60) log[userId].pop();
        localStorage.setItem(muse_feedback_log, JSON.stringify(log));
    }

    // chat ai, (Work by handsome guy) 

    //hey we do fake AI its fine, real AI llm model need backend no tme for it 

    var lastMoodCache = null;
    var lastActCache = null;

    function detectMoodAndActivity(msg) {

        var lower = msg.toLowerCase();

        var moodMap = {
            happy: ['happy', 'joy', 'good vibes', 'awesome', 'great', 'smile', 'excited'],
            sad: ['sad', 'down', 'depressed', 'blue', 'crying', 'unhappy'],
            focus: ['focus', 'study', 'code', 'reading', 'concentrate', 'homework'],
            energetic: ['workout', 'gym', 'run', 'party', 'hype', 'dance', 'exercise'],
            relax: ['chill', 'relax', 'sleep', 'meditate', 'calm', 'peaceful']


        };
        var actMap = {
            work: ['work', 'office', 'deadline', 'project', 'coding', 'job'],
            workout: ['gym', 'run', 'exercise', 'fitness', 'sweat', 'cardio'],
            relax: ['netflix', 'chill', 'bed', 'weekend', 'lazy', 'nap']
        };


        var foundMood = null;

        var foundAct = null;


        // for loops because .some() felt too fancy at 3am
        for (var m in moodMap) {
            var words = moodMap[m];
            for (var w = 0; w < words.length; w++) {
                if (lower.includes(words[w])) { 
                    foundMood = m; 
                    break; 
                }
            }
            if (foundMood) break;
        }
        for (var a in actMap) {
            var words2 = actMap[a];
            for (var w2 = 0; w2 < words2.length; w2++) {
                if (lower.includes(words2[w2])) { 
                    foundAct = a; 
                    break; 
                }
            }
            if (foundAct) break;
        }
        return { mood: foundMood, activity: foundAct };
    }

    async function handleChatMessage(rawMsg) {

        var currentUserRaw = localStorage.getItem(muse_active_user);
        var currentUser = currentUserRaw ? JSON.parse(currentUserRaw) : null;

        if (!currentUser) return "👉 Login first so I can remember your taste!";

        var lowerMsg = rawMsg.toLowerCase();

        
        if (lowerMsg.includes('hi') || lowerMsg.includes('hey') || lowerMsg.includes('hello')) 
        
        
        return "Hey hey! What's the mood? I'll find something dope for you. Try: 'I'm feeling happy and working out' or 'Need focus music for coding'";
        if (lowerMsg.includes('thanks') || lowerMsg.includes('thank you')) 
        
        
        return "You're welcome! Enjoy the music 🎶 Hit like/dislike to make recommendations even better!";
        
        var detected = detectMoodAndActivity(rawMsg);


        var finalMood = detected.mood || lastMoodCache || 'focus';



        var finalAct = detected.activity || lastActCache || 'work';
        
        if (!detected.mood && !detected.activity && !lowerMsg.includes('recommend') && !lowerMsg.includes('songs') && !lowerMsg.includes('music')) {
            return "Not sure what vibe you're in. Try: 'I'm feeling happy and going to the gym' or 'I need focus music for work' or 'something chill to relax'";
        }
        
        lastMoodCache = finalMood;

        lastActCache = finalAct;
        
        var recList = fetchRecommedations(currentUser.id, finalMood, finalAct); // misspelled on purpose lol
        setTimeout(() => {
            renderPlaylistToUI(recList);
        }, 50);
        
        var songLines = '';
        for (var idx = 0; idx < recList.length; idx++) {
            songLines += (idx+1) + '. ' + recList[idx].title + ' - ' + recList[idx].artist + '\n';
        }
        var moodEmoji = { happy: '😊', sad: '😢', focus: '🧠', energetic: '⚡', relax: '😌' }[finalMood] ||
         '🎵';
        var actEmoji = { work: '💻', workout: '💪', relax: '🛋️' }[finalAct] || '🎧';

        return `${moodEmoji} Alright! ${finalMood} mood ${actEmoji} ${finalAct} activity\n\n${songLines}\n\nCheck them below! Like/dislike to fine-tune your recommendations.`;
    }

    function addChatMsg(text, isUser) {



        var container = document.getElementById('chatMsgContainer');

        var div = document.createElement('div');

        div.className = `msg-bubble ${isUser ? 'msg-user' : 'msg-bot'}`;
        div.innerText = text;

        container.appendChild(div);

        container.scrollTop = container.scrollHeight;
    }

    async function dispatchChat() {
        var input = document.getElementById('chatUserInput');
        var txt = input.value.trim();

        if (!txt) return;
        addChatMsg(txt, true);

        input.value = '';
        addChatMsg('...', false);
        var lastMsgDiv = document.querySelector('#chatMsgContainer .msg-bot:last-child');


        var response = await handleChatMessage(txt);
        if (lastMsgDiv) lastMsgDiv.innerText = response;


    }

    function openChatWindow() {
        document.getElementById('globalChatWindow').style.display = 'flex';
    }
    function closeChatWindow() {
        document.getElementById('globalChatWindow').style.display = 'none';
    }

    //UI design (part 6)

    var currentMood = 'focus';

    var currentContext = 'work'; 
    
    function renderAuth() {
        var root = document.getElementById('rootApp');
        root.innerHTML = `
            <div class="card-panel">
                <h1>🎧 Musetify</h1>
                <div id="loginBlock">
                    <input type="text" id="loginUser" placeholder="username">
                    <input type="password" id="loginPass" placeholder="password">
                    <button class="btn btn-primary" onclick="handleLogin()">Login</button>
                    <p style="text-align:center; margin-top:16px; font-size:13px; color:#94a3b8;">
                        <i class="fas fa-key"></i> admin : admin admin123<br>
                        New? <a href="javascript:showRegisterForm()" style="color:#c084fc;">Create account</a>
                    </p>
                </div>





                <div id="registerBlock" class="hidden">
                    <input type="text" id="regUser" placeholder="username">
                    <input type="password" id="regPass" placeholder="password">


                    <button class="btn btn-primary" onclick="handleRegister()">Sign up</button>
                    <p style="text-align:center; margin-top:12px;"><a href="javascript:hideRegisterForm()" style="color:#94a3b8;">← Back to login</a></p>
                </div>
            </div>
        `;
    }
    
    function showRegisterForm() {
        document.getElementById('loginBlock').classList.add('hidden');
        document.getElementById('registerBlock').classList.remove('hidden');

    }

    function hideRegisterForm() {
        document.getElementById('loginBlock').classList.remove('hidden');
        document.getElementById('registerBlock').classList.add('hidden');


    }
    
    function handleLogin() {
        console.log("DEBUG: login attempt");
        var userVal = document.getElementById('loginUser').value;
        var passVal = document.getElementById('loginPass').value;



        var rawUsers = localStorage.getItem(muse_users_db);
        var users = rawUsers ? JSON.parse(rawUsers) : [];


        var found = null;
        for (var i = 0; i < users.length; i++) {
            if (users[i].username === userVal && users[i].password === passVal) {
                found = users[i];
                break; 



            }
        }
        if (found) {



            localStorage.setItem(muse_active_user, JSON.stringify(found));
            renderMainDashboard();
        } else {


            alert("Wrong username/password!");
        }
    }
    
    function handleRegister() {
        var newUser = document.getElementById('regUser').value.trim();
        var newPass = document.getElementById('regPass').value;

        if (!newUser || !newPass) return alert("Fill both fields");




        var rawUsers = localStorage.getItem(muse_users_db);
        var users = rawUsers ? JSON.parse(rawUsers) : [];

        var exists = false;
        for (var i = 0; i < users.length; i++) {


            if (users[i].username === newUser) { exists = true; break; }
        }

        if (exists) return alert("Username exists");
        var newId = Date.now();

        users.push({ id: newId, username: newUser, password: newPass, isAdmin: 0 });
        localStorage.setItem(muse_users_db, JSON.stringify(users));
        alert("Account created! Login now");

        hideRegisterForm();
    }
    
    function logout() {
        localStorage.removeItem(muse_active_user);
        renderAuth();
    }
    
    // renders playlist into the UI (sometimes called twice fix if possi


    function renderPlaylistToUI(songsArr) {
        var playlistContainer = document.getElementById('dynamicPlaylist');
        var wrapperDiv = document.getElementById('playlistSection');

        if (!playlistContainer) return;

        
        if (wrapperDiv) wrapperDiv.classList.remove('hidden');
        
        
        playlistContainer.innerHTML = '';
        
        if (!songsArr.length) {
            playlistContainer.innerHTML = '<div style="padding:12px; text-align:center;">no tracks found 🤷</div>';
            return;
        }
        for (var i = 0; i < songsArr.length; i++) {
            var s = songsArr[i];
            
            var div = document.createElement('div');
            div.className = 'song-row';
            
            var safeTitle = s.title.replace(/[&<>]/g, '');
            

            var safeArtist = s.artist.replace(/[&<>]/g, '');

            div.innerHTML = `
                <div>
                    <div class="song-title">${safeTitle}</div>
                    <div class="song-artist">${safeArtist} • ${s.genre}</div>
                </div>
                <div class="action-buttons">


                    <a href="${s.url}" target="_blank" style="text-decoration:none; margin-right:8px; color:#60a5fa;">▶️</a>
                    <button class="like-btn" onclick="rateSong(${s.id}, 1)">👍</button>



                    <button class="dislike-btn" onclick="rateSong(${s.id}, -1)">👎</button>



                    
                </div>



            `;
            playlistContainer.appendChild(div);
        }
    }
    
    function rateSong(songId, ratingValue) {
        var activeUsrRaw = localStorage.getItem(muse_active_user);
        var activeUsr = activeUsrRaw ? JSON.parse(activeUsrRaw) : null;


        if (!activeUsr) return;
        saveRating(activeUsr.id, songId, ratingValue, currentContext);
        refreshRecommedations(); // misspelled**
    }
    
    function refreshRecommedations() {
        var userRaw = localStorage.getItem(muse_active_user);
        var user = userRaw ? JSON.parse(userRaw) : null;


        if (!user) return;
        var recs = fetchRecommedations(user.id, currentMood, currentContext);

        renderPlaylistToUI(recs);
    }
    
    function generateNewMix() {
        refreshRecommedations();
    }
    
    function setMood(moodVal, btn) {
        currentMood = moodVal;

        var allChips = document.querySelectorAll('.mood-chip');

        for (var i = 0; i < allChips.length; i++) {

            allChips[i].classList.remove('active');
        }
        btn.classList.add('active');
        refreshRecommedations();
    }
    
    function setContext(ctxVal, btn) {
        currentContext = ctxVal;
        var allChips = document.querySelectorAll('.context-chip');


        for (var i = 0; i < allChips.length; i++) {
            allChips[i].classList.remove('active');


        }
        btn.classList.add('active');
        refreshRecommedations();
    }
    
    function renderMainDashboard() {
        var userRaw = localStorage.getItem(muse_active_user);
        var user = userRaw ? JSON.parse(userRaw) : null;

        if (!user) { renderAuth(); return; }

        var logsRaw = localStorage.getItem(muse_feedback_log);


        var logs = logsRaw ? JSON.parse(logsRaw) : {};




        var userHistory = logs[user.id] || [];
        
        // use for loop instead of map/slice/filter
        var recentActs = '';
        var count = 0;


        for (var i = 0; i < userHistory.length && count < 3; i++) {

            
            var h = userHistory[i];
            
            var allSRaw = localStorage.getItem(muse_songs_db);
            var allS = allSRaw ? JSON.parse(allSRaw) : [];
            
            var songMatch = null;
            for (var j = 0; j < allS.length; j++) {
            
                if (allS[j].id === h.songId) {
                    songMatch = allS[j];
                    break;
                }
            }
            if (songMatch) {
                recentActs += `🎵 ${songMatch.title} ${h.score > 0 ? '❤️' : '💔'}, `;
                count++;
            }
        }
        if (!recentActs) recentActs = 'no ratings yet';
        
        var adminBtn = user.isAdmin ? `<button class="btn-outline-sm" onclick="openAdminPanel()"><i class="fas fa-cog"></i> Admin</button>` : '';

    function openAdminPanel() {
        var userRaw = localStorage.getItem(muse_active_user);

        if (!user || !user.isAdmin) return alert("Admin access only");

                <div id="adminInnerPanel">loading...</div>
            </div>
        `;
        document.body.appendChild(modalDiv);
        showAdminUsers();
    }
    
    function showAdminUsers() {

        var raw = localStorage.getItem(muse_users_db);
        var users = raw ? JSON.parse(raw) : [];
        var panel = document.getElementById('adminInnerPanel');


        if (!panel) return;


        var rows = '';


        for (var i = 0; i < users.length; i++) {
            var u = users[i];

            var action = u.id !== 1001 ? `<button class="btn-outline-sm" onclick="delUser(${u.id})">Delete</button>` : '<span style="color:#6b7280;">protected</span>';
            rows += `<tr><td>${u.username}</td><td>${u.isAdmin ? 'Admin' : 'Regular'}</td><td>${action}</td></tr>`;
        }
        panel.innerHTML = `<table><thead><tr><th>User</th><th>Role</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table>`;
    }
    
    function showAdminSongs() {
        var raw = localStorage.getItem(muse_songs_db);
        var songs = raw ? JSON.parse(raw) : [];


        var panel = document.getElementById('adminInnerPanel');


        if (!panel) return;

        var rows = '';
        for (var i = 0; i < songs.length; i++) {
            var s = songs[i];
            rows += `<tr><td>${s.title}</td><td>${s.artist}</td><td><button class="btn-outline-sm" onclick="delSong(${s.id})">Remove</button></td></tr>`;
        }
        panel.innerHTML = `<button class="btn-outline-sm" onclick="addSongPrompt()" style="margin-bottom:12px;">➕ Add new song</button>
        <div style="overflow-x:auto;"><table><thead><tr><th>Title</th><th>Artist</th><th>Action</th></tr></thead><tbody>${rows}</tbody></table></div>`;
    }
    
    window.delUser = (uid) => {
        if(!confirm("Delete user permanently?")) return;

        var raw = localStorage.getItem(muse_users_db);

        var users = raw ? JSON.parse(raw) : [];
        var newUsers = [];

        for (var i = 0; i < users.length; i++) {
            if (users[i].id !== uid) newUsers.push(users[i]);

        }
        localStorage.setItem(muse_users_db, JSON.stringify(newUsers));



        showAdminUsers();
    };
    window.delSong = (sid) => {
        if(!confirm("Remove song from library?")) return;
        var raw = localStorage.getItem(muse_songs_db);
        var songs = raw ? JSON.parse(raw) : [];
        var newSongs = [];



        for (var i = 0; i < songs.length; i++) {
            if (songs[i].id !== sid) newSongs.push(songs[i]);
        }
        localStorage.setItem(muse_songs_db, JSON.stringify(newSongs));
        showAdminSongs();
    };
    window.addSongPrompt = () => {
        var title = prompt("Song title?");
        var artist = prompt("Artist?");
        if(!title || !artist) return;
        var genre = prompt("Genre (optional):") || "Indie";
        var raw = localStorage.getItem(muse_songs_db);
        var songs = raw ? JSON.parse(raw) : [];




        songs.push({
            id: Date.now(), 
            title: title, 
            artist: artist, 
            genre: genre, 
            energy: 0.6, 
            valence: 0.6,
            vibe: ["general"], 
            url: "https://youtu.be/dQw4w9WgXcQ"


        });
        localStorage.setItem(muse_songs_db, JSON.stringify(songs));
        showAdminSongs();
    };
    window.showAdminUsers = showAdminUsers;
